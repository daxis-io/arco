name: Nightly Chaos Tests

on:
  workflow_dispatch:
    inputs:
      chaos_seed:
        description: 'Seed for deterministic chaos (reserved for future suites)'
        required: false
        type: string
      chaos_duration_minutes:
        description: 'Duration for future chaos suites'
        required: false
        default: '30'
        type: string

permissions:
  contents: read

jobs:
  deterministic-orchestration:
    name: Deterministic orchestration coverage
    runs-on: ubuntu-24.04
    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: 1
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # stable
        with:
          toolchain: 1.88

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2

      - name: Run deterministic orchestration coverage
        run: cargo test -p arco-flow --test orchestration_correctness_tests

      - name: Report chaos status
        run: |
          {
            echo "## Nightly chaos status"
            echo ""
            echo "This workflow is manual-only and runs the deterministic multi-instance and clock-skew orchestration coverage."
            echo "Full randomized chaos remains opt-in until stable backing suites and Cargo features exist."
          } >> "$GITHUB_STEP_SUMMARY"
