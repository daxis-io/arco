version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "monthly"
      time: "09:00"
      timezone: "America/Indiana/Indianapolis"
    open-pull-requests-limit: 1
    rebase-strategy: "disabled"
    cooldown:
      semver-patch-days: 7
      semver-minor-days: 21
    groups:
      rust-minor:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
    commit-message:
      prefix: "deps(rust)"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      time: "09:30"
      timezone: "America/Indiana/Indianapolis"
    open-pull-requests-limit: 1
    rebase-strategy: "disabled"
    cooldown:
      default-days: 14
    groups:
      actions:
        patterns:
          - "*"
    commit-message:
      prefix: "deps(actions)"

  - package-ecosystem: "uv"
    directory: "/python"
    schedule:
      interval: "monthly"
      time: "10:00"
      timezone: "America/Indiana/Indianapolis"
    open-pull-requests-limit: 1
    rebase-strategy: "disabled"
    cooldown:
      semver-patch-days: 7
      semver-minor-days: 21
    groups:
      python-minor:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
    commit-message:
      prefix: "deps(python)"

  - package-ecosystem: "uv"
    directory: "/python/arco"
    schedule:
      interval: "monthly"
      time: "10:30"
      timezone: "America/Indiana/Indianapolis"
    open-pull-requests-limit: 1
    rebase-strategy: "disabled"
    cooldown:
      semver-patch-days: 7
      semver-minor-days: 21
    groups:
      python-flow-minor:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
    commit-message:
      prefix: "deps(python)"

  - package-ecosystem: "terraform"
    directory: "/infra/terraform"
    schedule:
      interval: "monthly"
      time: "11:00"
      timezone: "America/Indiana/Indianapolis"
    open-pull-requests-limit: 1
    rebase-strategy: "disabled"
    cooldown:
      default-days: 14
    commit-message:
      prefix: "deps(terraform)"
