syntax = "proto3";

package arco.common.v1;

option go_package = "github.com/daxis-io/arco/proto/arco/common/v1";
option java_multiple_files = true;
option java_package = "com.arco.common.v1";

// Ordered partition dimension.
message PartitionDimension {
  string name = 1;
  ScalarValue value = 2;
}

// Multi-dimensional partition key with explicit canonical order.
message PartitionKey {
  repeated PartitionDimension dimensions = 1;
}

// Scalar value with explicit type for canonical encoding.
message ScalarValue {
  oneof value {
    string string_value = 1;
    int64 int64_value = 2;
    bool bool_value = 3;
    string date_value = 4;
    string timestamp_value = 5;
    NullValue null_value = 6;
  }
}

enum NullValue {
  NULL_VALUE_UNSPECIFIED = 0;
  NULL_VALUE_NULL = 1;
}

// Supported table formats across public Arco contracts.
enum TableFormat {
  TABLE_FORMAT_UNSPECIFIED = 0;
  TABLE_FORMAT_DELTA = 1;
  TABLE_FORMAT_ICEBERG = 2;
  TABLE_FORMAT_PARQUET = 3;
}

// Canonical published file metadata reused across catalog/orchestration contracts.
message FileEntry {
  string path = 1;
  uint64 size_bytes = 2;
  optional uint64 row_count = 3;
  optional string content_hash = 4;
  optional string format = 5;
}
